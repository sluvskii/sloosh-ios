name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  simulator-build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild \
            -project SlooshIOS.xcodeproj \
            -scheme SlooshIOS \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

  unsigned-archive:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Create Unsigned Archive
        run: |
          mkdir -p build
          xcodebuild archive \
            -project SlooshIOS.xcodeproj \
            -scheme SlooshIOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/SlooshIOS.xcarchive \
            SKIP_INSTALL=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/SlooshIOS.xcarchive/Products/Applications/SlooshIOS.app Payload/
          zip -r build/SlooshIOS.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlooshIOS-unsigned-ipa
          path: build/SlooshIOS.ipa

      - name: Create Release and Upload IPA
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: build/SlooshIOS.ipa
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
