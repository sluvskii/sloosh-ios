workflows:
  ios-sloosh-build:
    name: Sloosh iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      xcode: latest

    scripts:
      - name: Build app for simulator
        script: |
          xcodebuild \
            -project SlooshIOS.xcodeproj \
            -scheme SlooshIOS \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            build

  ios-sloosh-unsigned-archive:
    name: Sloosh iOS Unsigned Archive
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      xcode: latest

    scripts:
      - name: Create unsigned archive
        script: |
          mkdir -p build
          xcodebuild archive \
            -project SlooshIOS.xcodeproj \
            -scheme SlooshIOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/SlooshIOS.xcarchive \
            SKIP_INSTALL=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

    artifacts:
      - build/SlooshIOS.xcarchive
